name: test
on: push
jobs:
  test:
    runs-on: ubuntu-22.04
    permissions:
      # required for all workflows
      security-events: write
      # only required for workflows in private repositories
      actions: read
      contents: read
    
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Run Ansible 2.9 scan
        uses: xlab-steampunk/spotter-action@5.2.0
        env:
          SPOTTER_TOKEN: ${{ secrets.SPOTTER_API_TOKEN }}
        with:
          ansible_version: 2.9
        continue-on-error: true

      - name: Run Ansible 2.16 scan
        uses: xlab-steampunk/spotter-action@5.2.0
        env:
          SPOTTER_TOKEN: ${{ secrets.SPOTTER_API_TOKEN }}
        with:
          ansible_version: 2.16
        continue-on-error: true

      - name: Run security scan
        uses: xlab-steampunk/spotter-action@5.2.0
        env:
          SPOTTER_TOKEN: ${{ secrets.SPOTTER_API_TOKEN }}
        with:
          ansible_version: 2.16
          profile: security
        continue-on-error: true


      - name: Run Ansible scan with SARIF output
        uses: xlab-steampunk/spotter-action@5.2.0
        with:
          ansible_version: 2.16
          profile: full
          sarif_file: spotter.sarif
        continue-on-error: true

      - name: Print sarif
        run: cat spotter.sarif

      - name: Read SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: spotter.sarif
          category: ansible